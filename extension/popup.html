<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      /* Typography scale and stack values */
      --font-stack: "Inter", -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      --font-xs: 10px;
      --font-sm: 12px;
      --font-md: 14px;
      --font-lg: 16px;
      --font-xl: 18px;
      --font-2xl: 30px;

      /* Color palette tokens */
      --text-primary: oklch(0.704 0.04 256.788); /* Muted slate body */
      --text-secondary: oklch(0.968 0.007 247.896); /* Slate white highlights */
      --text-inverse: oklch(0.929 0.013 255.508);
      --surface-base: #000000;
      --surface-strong: #0f172a;
      --surface-raised: oklch(0.541 0.281 293.009); /* Violet brand accent */
      --border-muted: rgba(255, 255, 255, 0.1);
      
      --accent: oklch(0.541 0.281 293.009);
      --accent-hover: oklch(0.59 0.24 290.0);
      --danger: #f87171;
      --success: #34d399;

      /* Radius tokens */
      --radius-xs: 5px;
      --radius-sm: 8px;
      --radius-md: 12px;

      /* Spacing tokens */
      --space-1: 5px;
      --space-2: 6px;
      --space-3: 8px;
      --space-4: 12px;
      --space-5: 14px;
      --space-6: 16px;
      --space-7: 20px;
      --space-8: 24px;

      /* Shadows and motion durations */
      --shadow-1: rgba(255, 255, 255, 0.08) 0px 1px 1px 0px inset, rgba(0, 0, 0, 0.25) 0px 6px 15px 0px;
      --shadow-2: oklab(0.606 0.096545 -0.230606 / 0.1) 0px 4px 6px -1px, oklab(0.606 0.096545 -0.230606 / 0.1) 0px 2px 4px -2px;
      --shadow-3: rgba(255, 255, 255, 0.05) 0px -1px 0px 0px inset, rgba(0, 0, 0, 0.2) 0px 10px 20px 0px;

      --motion-duration-fast: 200ms;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-stack);
      background-color: var(--surface-base);
      background-image: radial-gradient(circle at top left, var(--surface-strong) 0%, var(--surface-base) 100%);
      color: var(--text-primary);
      width: 360px;
      padding: var(--space-6);
      font-size: var(--font-md);
      line-height: 24px;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      border-bottom: 1px solid var(--border-muted);
      padding-bottom: var(--space-5);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: var(--radius-sm);
      background-color: var(--surface-raised);
      color: white;
      box-shadow: 0 4px 10px 0 rgba(124, 58, 237, 0.2);
    }

    .logo-container svg {
      width: 13px;
      height: 13px;
      color: white;
    }

    .logo-text {
      font-size: var(--font-lg);
      font-weight: 800; /* Extra bold */
      letter-spacing: -0.03em; /* tracking-tight */
      color: var(--text-secondary);
      font-family: var(--font-stack);
    }

    .url-preview-container {
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid var(--border-muted);
      box-shadow: var(--shadow-1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .url-label {
      font-size: var(--font-xs);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-primary);
      font-weight: 700;
    }

    .url-text {
      font-family: monospace;
      font-size: var(--font-sm);
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-6);
      border-radius: var(--radius-md);
      font-weight: 700;
      cursor: pointer;
      transition: all var(--motion-duration-fast) cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
      font-size: var(--font-sm);
      width: 100%;
      font-family: var(--font-stack);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background-color: var(--surface-raised);
      color: white;
      box-shadow: 0 4px 12px 0 rgba(124, 58, 237, 0.25);
    }

    .btn-primary:not(:disabled):hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px 0 rgba(124, 58, 237, 0.35);
    }

    .btn-primary:not(:disabled):active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-muted);
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow-1);
    }

    .btn-secondary:not(:disabled):hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .btn-secondary:not(:disabled):active {
      transform: translateY(0);
    }

    .status-container {
      margin-top: var(--space-5);
      display: none;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-md);
      padding: var(--space-4);
    }

    .spinner {
      border: 2px solid rgba(255, 255, 255, 0.05);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border-left-color: var(--accent);
      animation: spin 0.8s linear infinite;
      margin: var(--space-2) auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status-text {
      text-align: center;
      color: var(--text-primary);
      font-size: var(--font-sm);
      font-weight: 500;
      margin-top: var(--space-2);
    }

    .error-msg {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      padding: var(--space-4);
      border-radius: var(--radius-sm);
      margin-top: var(--space-5);
      font-size: var(--font-sm);
      font-weight: 500;
      display: none;
      text-align: center;
    }

    .results {
      margin-top: var(--space-6);
      display: none;
      flex-direction: column;
      gap: var(--space-4);
    }

    .video-info {
      display: flex;
      gap: var(--space-4);
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid var(--border-muted);
      box-shadow: var(--shadow-1);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .thumbnail {
      width: 96px;
      height: 58px;
      background-color: var(--surface-base);
      border-radius: var(--radius-sm);
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border-muted);
    }

    .video-details {
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      gap: var(--space-1);
    }

    .video-title {
      font-size: var(--font-sm);
      font-weight: 700;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .video-author {
      font-size: var(--font-xs);
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .formats-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      max-height: 220px;
      overflow-y: auto;
      padding-right: var(--space-1);
    }

    /* Scrollbar Styling */
    .formats-list::-webkit-scrollbar {
      width: 4px;
    }
    .formats-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .formats-list::-webkit-scrollbar-thumb {
      background: var(--border-muted);
      border-radius: 2px;
    }

    .format-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-muted);
      padding: var(--space-4) var(--space-6);
      border-radius: var(--radius-sm);
      color: var(--text-inverse);
      text-decoration: none;
      font-size: var(--font-sm);
      font-weight: 600;
      transition: all var(--motion-duration-fast) ease;
      box-shadow: var(--shadow-1);
      font-family: var(--font-stack);
    }

    .format-btn:hover {
      background: rgba(124, 58, 237, 0.1);
      border-color: rgba(124, 58, 237, 0.3);
      color: var(--text-secondary);
      transform: translateY(-0.5px);
    }

    .format-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .format-badge {
      background-color: rgba(167, 139, 250, 0.12);
      color: var(--text-secondary);
      padding: 3px 7px;
      border-radius: var(--radius-xs);
      font-size: var(--font-xs);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      border: 1px solid rgba(167, 139, 250, 0.2);
    }

    .format-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-primary);
    }

    .format-size {
      font-size: var(--font-xs);
      font-weight: 500;
    }

    .svg-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <div class="logo-text">Downloader</div>
  </div>

  <div class="url-preview-container">
    <div class="url-label">Current Tab URL</div>
    <div id="tab-url" class="url-text">Loading page URL...</div>
  </div>

  <div class="actions">
    <button id="btn-quick" class="btn btn-primary" disabled>
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Quick Download
    </button>
    <button id="btn-open-web" class="btn btn-secondary" disabled>
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open in Downloader Web
    </button>
  </div>

  <div id="status-container" class="status-container">
    <div class="spinner"></div>
    <div id="status-text" class="status-text">Extracting metadata...</div>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <div id="results" class="results">
    <div class="video-info">
      <img id="video-thumb" class="thumbnail" src="" alt="Thumbnail">
      <div class="video-details">
        <div id="video-title" class="video-title"></div>
        <div id="video-author" class="video-author"></div>
      </div>
    </div>
    <div id="formats-list" class="formats-list">
      <!-- Formats will be loaded dynamically here -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
