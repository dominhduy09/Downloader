<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenDownload Helper</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: #111827;
      --border: #1f2937;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --danger: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      width: 360px;
      padding: 16px;
      font-size: 14px;
      overflow-x: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .header svg {
      color: var(--accent);
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    .url-preview-container {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .url-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 500;
    }

    .url-text {
      font-family: monospace;
      font-size: 12px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      font-size: 13.5px;
      width: 100%;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-secondary {
      background-color: transparent;
      border-color: var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: var(--text-muted);
    }

    .status-container {
      margin-top: 12px;
      display: none;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border-left-color: var(--accent);
      animation: spin 1s linear infinite;
      margin: 12px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status-text {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .error-msg {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      padding: 10px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 13px;
      display: none;
    }

    .results {
      margin-top: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .video-info {
      display: flex;
      gap: 10px;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 8px;
    }

    .thumbnail {
      width: 90px;
      height: 54px;
      background-color: #1e293b;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .video-details {
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .video-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .video-author {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .formats-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Scrollbar Styling */
    .formats-list::-webkit-scrollbar {
      width: 4px;
    }
    .formats-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .formats-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .format-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #161f30;
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .format-btn:hover {
      background-color: rgba(139, 92, 246, 0.15);
      border-color: var(--accent);
    }

    .format-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .format-badge {
      background-color: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .format-right {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
    }

    .format-size {
      font-size: 11px;
    }

    .svg-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div class="header">
    <!-- Lucide ArrowDownToLine style SVG -->
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 17V3"/>
      <path d="m6 11 6 6 6-6"/>
      <path d="M19 21H5"/>
    </svg>
    <div class="title">GenDownload Helper</div>
  </div>

  <div class="url-preview-container">
    <div class="url-label">Current Tab URL</div>
    <div id="tab-url" class="url-text">Loading page URL...</div>
  </div>

  <div class="actions">
    <button id="btn-quick" class="btn btn-primary" disabled>
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Quick Download
    </button>
    <button id="btn-open-web" class="btn btn-secondary" disabled>
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open in Downloader Web
    </button>
  </div>

  <div id="status-container" class="status-container">
    <div class="spinner"></div>
    <div id="status-text" class="status-text">Extracting metadata...</div>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <div id="results" class="results">
    <div class="video-info">
      <img id="video-thumb" class="thumbnail" src="" alt="Thumbnail">
      <div class="video-details">
        <div id="video-title" class="video-title"></div>
        <div id="video-author" class="video-author"></div>
      </div>
    </div>
    <div id="formats-list" class="formats-list">
      <!-- Formats will be loaded dynamically here -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
